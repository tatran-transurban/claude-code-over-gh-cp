litellm_settings:
  drop_params: true
  # Enable master key authentication
  master_key: os.environ/LITELLM_MASTER_KEY
  # Optional: Set request timeout
  request_timeout: 600

  # optional budget limit
  max_budget: 20.0 # (float) sets max budget as $30 USD daily
  budget_duration: 1d # (str) frequency of reset - You can set duration as seconds ("30s"), minutes ("30m"), hours ("30h"), days ("30d").

general_settings:
  # Require authentication for all requests
  enforce_authentication: true
  # Rate limiting: 100 requests per minute per user
  max_parallel_requests: 10
  global_max_parallel_requests: 20

  # For cost/usage tracking, uncomment the lines below after running: .\run.ps1 cost-tracking-init --postgres-url <URL>
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
  store_prompts_in_spend_logs: true

model_list:
  - model_name: gpt-5.4
    litellm_params:
      model: github_copilot/gpt-5.4
      extra_headers: {"Editor-Version": "vscode/1.121.0", "Copilot-Integration-Id": "vscode-chat"}
